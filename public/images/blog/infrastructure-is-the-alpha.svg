<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0604"/>
      <stop offset="50%" style="stop-color:#180e02"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E49D2F"/>
      <stop offset="100%" style="stop-color:#F6AE3F"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#E49D2F" stroke-width="0.5">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="400" rx="400" ry="250" fill="#E49D2F" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Top-left tag -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="rgba(228,157,47,0.12)" stroke="#E49D2F" stroke-width="0.5" opacity="0.6"/>
    <text x="40" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#E49D2F" text-anchor="middle" letter-spacing="1">RESEARCH</text>
  </g>

  <!-- Title -->
  <text x="600" y="300" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">Infrastructure Is the Alpha</text>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">Q1 2026: $137M in exploits. &lt;0.5% insured. The risk layer is missing.</text>

  <!-- Simple divider line -->
  <line x1="500" y1="420" x2="700" y2="420" stroke="#E49D2F" stroke-width="2" opacity="0.4"/>

  <!-- Bottom stat pills -->
  <g transform="translate(260, 520)">
    <rect x="0" y="0" width="140" height="45" rx="22" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="70" y="20" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#E49D2F" text-anchor="middle">$137M</text>
    <text x="70" y="36" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">Q1 Exploits</text>
  </g>
  <g transform="translate(430, 520)">
    <rect x="0" y="0" width="140" height="45" rx="22" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="70" y="20" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#E49D2F" text-anchor="middle">&lt;0.5%</text>
    <text x="70" y="36" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">TVL Insured</text>
  </g>
  <g transform="translate(600, 520)">
    <rect x="0" y="0" width="140" height="45" rx="22" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="70" y="20" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#E49D2F" text-anchor="middle">328K BTC</text>
    <text x="70" y="36" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">US Holdings</text>
  </g>
  <g transform="translate(770, 520)">
    <rect x="0" y="0" width="140" height="45" rx="22" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="70" y="20" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#E49D2F" text-anchor="middle">$27B+</text>
    <text x="70" y="36" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">RWA Market</text>
  </g>

  <!-- BitVault watermark -->
  <text x="1140" y="720" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#E49D2F" text-anchor="end" opacity="0.4" letter-spacing="1">BITVAULT.FINANCE</text>

  <!-- Date -->
  <text x="60" y="720" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">April 13, 2026</text>
</svg>
