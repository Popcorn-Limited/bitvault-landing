    <path d="M0,-85 L60,-55 L60,20 Q60,65 0,85 Q-60,65 -60,20 L-60,-55 Z" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1.5" opacity="0.6"/>
    <rect x="-20" y="-15" width="40" height="35" rx="4" fill="none" stroke="#E49D2F" stroke-width="2" opacity="0.8"/>
