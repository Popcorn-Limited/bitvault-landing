<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0604"/>
      <stop offset="50%" style="stop-color:#180e02"/>
      <stop offset="100%" style="stop-color:#0d0800"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E49D2F"/>
      <stop offset="100%" style="stop-color:#F6AE3F"/>
    </linearGradient>
    <linearGradient id="goldFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E49D2F;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#E49D2F;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowUp" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#E49D2F;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#E49D2F;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#E49D2F" stroke-width="0.5">
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="750"/>
    <line x1="600" y1="0" x2="600" y2="750"/>
    <line x1="800" y1="0" x2="800" y2="750"/>
    <line x1="1000" y1="0" x2="1000" y2="750"/>
  </g>

  <!-- Ambient glow bottom-left -->
  <ellipse cx="150" cy="650" rx="300" ry="200" fill="#E49D2F" opacity="0.04" filter="url(#softGlow)"/>

  <!-- Ambient glow top-right -->
  <ellipse cx="1050" cy="100" rx="250" ry="150" fill="#E49D2F" opacity="0.03" filter="url(#softGlow)"/>

  <!-- Three converging arrows / layers visual -->
  <!-- Layer 1: Tokenization (left) -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="none" stroke="#E49D2F" stroke-width="1.5" opacity="0.3"/>
    <rect x="0" y="0" width="280" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
    <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#E49D2F" letter-spacing="2" opacity="0.8">LAYER 1</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Tokenization</text>
    <text x="20" y="95" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">$27B+ RWA Market</text>
  </g>

  <!-- Layer 2: Lending (center) -->
  <g transform="translate(460, 200)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="none" stroke="#E49D2F" stroke-width="1.5" opacity="0.3"/>
    <rect x="0" y="0" width="280" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
    <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#E49D2F" letter-spacing="2" opacity="0.8">LAYER 2</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Lending</text>
    <text x="20" y="95" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">125% Collateralization</text>
  </g>

  <!-- Layer 3: Yield (right) -->
  <g transform="translate(840, 200)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="none" stroke="#E49D2F" stroke-width="1.5" opacity="0.3"/>
    <rect x="0" y="0" width="280" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
    <text x="20" y="35" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#E49D2F" letter-spacing="2" opacity="0.8">LAYER 3</text>
    <text x="20" y="65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Yield</text>
    <text x="20" y="95" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#9ca3af">4-40% BTC APY</text>
  </g>

  <!-- Connecting lines between layers -->
  <line x1="360" y1="260" x2="460" y2="260" stroke="#E49D2F" stroke-width="1" opacity="0.25" stroke-dasharray="4,4"/>
  <line x1="740" y1="260" x2="840" y2="260" stroke="#E49D2F" stroke-width="1" opacity="0.25" stroke-dasharray="4,4"/>

  <!-- Arrow dots at connections -->
  <circle cx="460" cy="260" r="3" fill="#E49D2F" opacity="0.5"/>
  <circle cx="840" cy="260" r="3" fill="#E49D2F" opacity="0.5"/>

  <!-- Convergence arrow pointing down -->
  <line x1="600" y1="340" x2="600" y2="420" stroke="#E49D2F" stroke-width="1.5" opacity="0.4"/>
  <polygon points="592,415 600,430 608,415" fill="#E49D2F" opacity="0.4"/>

  <!-- Central convergence box -->
  <g transform="translate(350, 440)">
    <rect x="0" y="0" width="500" height="100" rx="10" fill="rgba(228,157,47,0.06)" stroke="#E49D2F" stroke-width="1.5" opacity="0.5"/>
    <text x="250" y="40" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#E49D2F" letter-spacing="3" text-anchor="middle" opacity="0.9">INSTITUTIONAL DEFI STACK</text>
    <text x="250" y="72" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#ffffff" text-anchor="middle" opacity="0.8">Composable. Capital Efficient. Institutional.</text>
  </g>

  <!-- Bottom stat pills -->
  <g transform="translate(120, 590)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#E49D2F" text-anchor="middle">$11B</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Tokenized Treasuries</text>
  </g>
  <g transform="translate(330, 590)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#E49D2F" text-anchor="middle">~3,000%</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Equity YoY Growth</text>
  </g>
  <g transform="translate(540, 590)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#E49D2F" text-anchor="middle">$130M+</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">BTC in Yield Basis</text>
  </g>
  <g transform="translate(750, 590)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="rgba(228,157,47,0.08)" stroke="#E49D2F" stroke-width="1" opacity="0.3"/>
    <text x="80" y="22" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#E49D2F" text-anchor="middle">20%+</text>
    <text x="80" y="40" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Backtested BTC Yield</text>
  </g>

  <!-- Top-left tag -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="rgba(228,157,47,0.12)" stroke="#E49D2F" stroke-width="0.5" opacity="0.6"/>
    <text x="40" y="17" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#E49D2F" text-anchor="middle" letter-spacing="1">RESEARCH</text>
  </g>

  <!-- Title area -->
  <text x="60" y="130" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" fill="#ffffff">The RWA Yield Landscape</text>
  <text x="60" y="165" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#9ca3af">From Tokenized Equities to Volatility Harvesting</text>

  <!-- BitVault watermark bottom-right -->
  <text x="1140" y="720" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#E49D2F" text-anchor="end" opacity="0.4" letter-spacing="1">BITVAULT.FINANCE</text>

  <!-- Date -->
  <text x="60" y="720" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#6b7280">March 26, 2026</text>
</svg>
